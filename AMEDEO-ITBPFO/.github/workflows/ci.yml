name: AMEDEO-ITBPFO CI

on:
  push:
    branches: [main]
    paths:
      - "AMEDEO-ITBPFO/**"
  pull_request:
    branches: [main]
    paths:
      - "AMEDEO-ITBPFO/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AMEDEO-ITBPFO

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: pytest tests/ -v
